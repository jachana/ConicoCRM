# tboard project config for Conico CRM.
# Paths below are resolved relative to this file's directory.
# See https://github.com/<owner>/tboard for schema.

project_name = "Conico CRM"
domain_hint  = "Chilean SaaS"
stack        = "FastAPI + SQLAlchemy + Alembic backend; React + Vite + TS frontend"

cards_file       = "cards.json"
env_file         = ".env"
breakdowns_file  = "breakdowns.json"

# Paths used by the implementer pre-scope step (`git ls-files <paths>`).
# Resolved relative to the git repo root, not this file.
source_paths = ["backend/app", "frontend/src", "migrations"]

[checklist]
name = "Subtareas"

[lists]
eligible      = "Feature requests"
claimed       = "In progress"
shipped       = "In review"
done          = ["In review", "Friendly Beta 0.1", "Live Beta 0.2", "Live 1.0"]
refine        = ["Ideas", "Feature requests", "Bugs", "Client feedback"]
autoship_from = ["Feature requests", "Bugs", "Client feedback"]

[pipeline]
default_branch       = "master"
agent_backend        = "claude"
skip_name_prefixes   = ["onboarding", "import ", "migra"]
skip_labels          = ["Blocked"]
dirty_ignore_prefixes = [
    ".claude/",
    ".trello_agent/",
    "Conico-reportes",
]
codebase_map_file    = "codebase_map.md"
failure_log_file     = "failure_log.json"
log_dir              = "logs"

# Tests run after each implementation attempt, in order.
# cmd[0] shims: "bash" -> first usable bash on PATH (skips step if none);
#               "npm" -> "npm.cmd" on Windows; "python" -> sys.executable.

[[pipeline.test_steps]]
name              = "backend pytest"
cwd               = "backend"
cmd               = ["bash", "./run_tests.sh"]
test_path_prefix  = "backend/"
test_glob         = ["test_*.py", "*_test.py"]

[[pipeline.test_steps]]
name                  = "frontend vitest"
cwd                   = "frontend"
cmd                   = ["npm", "test", "--", "--run"]
test_path_prefix      = "frontend/"
test_glob             = ["*.test.ts", "*.test.tsx", "*.spec.ts", "*.spec.tsx", "*.test.js", "*.test.jsx"]
only_if_changed_under = "frontend/"

[[pipeline.test_steps]]
name                  = "frontend build"
cwd                   = "frontend"
cmd                   = ["npm", "run", "build"]
only_if_changed_under = "frontend/"
