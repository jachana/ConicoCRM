name: CI

on:
  push:
    branches: [master, feature/**]
  pull_request:
    branches: [master]

jobs:
  migrations-guard:
    name: Alembic single-head guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Verify single Alembic head
        working-directory: backend
        run: |
          heads_output=$(python -m alembic heads 2>&1)
          echo "$heads_output"
          if echo "$heads_output" | grep -qi "present more than once"; then
            echo "ERROR: duplicate revision id detected — two migration files share a revision id."
            exit 1
          fi
          head_count=$(python -m alembic heads | grep -c '(head)')
          if [ "$head_count" -ne 1 ]; then
            echo "ERROR: expected exactly 1 Alembic head, found $head_count"
            exit 1
          fi

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install ruff==0.8.4
      - run: ruff check backend/app backend/tests
        working-directory: .

  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: ci-secret-key-for-testing-only
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install WeasyPrint system deps
        run: sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libffi-dev
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests
        run: python -m pytest backend/tests/ -q --tb=short --ignore=backend/tests/test_aprobaciones_costo.py
        working-directory: .

  frontend-lint:
    name: Frontend lint (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

  frontend-test:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests
        run: npx vitest --run
        working-directory: frontend
